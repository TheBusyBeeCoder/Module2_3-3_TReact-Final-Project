<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reed_TReact Final</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/d292e46848.js" crossorigin="anonymous"></script>
    <script src="index.js"></script>

</head>

<body>
    <section id="landing">
        <nav>
            <div class="nav__container">
                <div class="row nav__row">
                    <div class="nav__logo">
                        <img class="logo" src="./assets/logo.2c489fc453a1783cbadacf914efa3df6.svg" alt="logo">
                        <div class="row nav__row--title">Treact</div>
                    </div>
                </div>
                <div class="nav__links">
                    <ul class="nav__links">
                        <li><a href="#" class="nav__link">About</a></li>
                        <li><a href="#" class="nav__link">Blog</a></li>
                        <li><a href="#" class="nav__link">Pricing</a></li>
                        <li><a href="#" class="nav__link">Contact Us</a></li>
                        <li><a href="#" class="nav__link login">Login</a></li>
                        <li><a href="#" class="nav__link nav__link--primary">Sign Up</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <header>
            <div class="container">
                <div class="row">
                    <div class="header__description">
                        <h1>Beautiful React Templates <span class="purple">for you.</span></h1>
                        <p class="header__description--para">Our templates are easy to setup, understand and customize.
                            Fully
                            modular components with a variety of pages and components.</p>
                        <div class="header__email">
                            <input type="text" class="header__email--input" placeholder="Your email address">
                            <button class="header__email--btn">Get Started</button>
                        </div>
                        <p class="header__customers--title">OUR TRUSTED CUSTOMERS</p>
                        <img src="./assets/customers-logo-strip.680ac7c2e8ae28161d2c.png"
                            class="header__customers--logo" alt="Customers Logo">
                    </div>
                    <figure class="header__img--wrapper">
                        <img src="./assets/design-illustration-2.6da6a00b20c07c4a9b65d1870679e1b8.svg"
                            class="header__img">
                    </figure>
                </div>
            </div>
        </header>
    </section>

</body>

</html>
